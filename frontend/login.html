<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <form id="loginForm" aria-label="Login Form">
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required aria-required="true"/>
            <span id="emailError" aria-live="assertive"></span>
        </div>
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required aria-required="true"/>
            <span id="passwordError" aria-live="assertive"></span>
        </div>
        <button type="submit">Login</button>
        <div id="loading" aria-hidden="true" style="display:none;">Loading...</div>
    </form>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent default form submission
            let email = document.getElementById('email').value;
            let password = document.getElementById('password').value;
            let emailError = document.getElementById('emailError');
            let passwordError = document.getElementById('passwordError');
            let loading = document.getElementById('loading');

            // Clear previous error messages
            emailError.innerText = '';
            passwordError.innerText = '';

            // Validate email format
            let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                emailError.innerText = 'Invalid email format.';
                emailError.setAttribute('role', 'alert');
                return;
            }

            // Validate password length
            if (password.length < 8) {
                passwordError.innerText = 'Password must be at least 8 characters long.';
                passwordError.setAttribute('role', 'alert');
                return;
            }

            // Show loading state
            loading.style.display = 'block';

            // Simulate API call
            setTimeout(() => {
                loading.style.display = 'none';
                alert('Logged in successfully!'); // Replace with actual login logic
                document.getElementById('loginForm').reset(); // Clear form fields
            }, 2000);
        });
    </script>
</body>
</html>
